<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="岗位提示词工坊可根据岗位职责快速生成专业 AI 提示词，支持搜索、自定义职责、收藏和导出。">
    <meta property="og:title" content="岗位提示词工坊">
    <meta property="og:description" content="面向 HR、市场、产品、开发、设计等岗位的 AI 提示词生成工具。">
    <meta property="og:type" content="website">
    <title>岗位提示词工坊</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="shell">
        <aside class="sidebar" aria-label="岗位导航">
            <div class="brand">
                <div class="brand-mark" aria-hidden="true">P</div>
                <div>
                    <h1>岗位提示词工坊</h1>
                    <p>Prompt Workshop</p>
                </div>
            </div>

            <label class="search-box">
                <span aria-hidden="true">⌕</span>
                <input id="searchInput" type="search" placeholder="搜索岗位或职责" autocomplete="off">
            </label>

            <nav id="jobList" class="job-list" aria-label="岗位列表"></nav>
        </aside>

        <main class="workspace">
            <section class="role-toolbar" aria-label="当前岗位">
                <div>
                    <p class="eyebrow">当前岗位</p>
                    <h2 id="roleTitle">HR 人力资源</h2>
                </div>
                <div class="toolbar-actions">
                    <button id="favoriteBtn" class="icon-button" type="button" aria-label="收藏当前提示词" title="收藏当前提示词">☆</button>
                    <button id="downloadBtn" class="icon-button" type="button" aria-label="下载当前提示词" title="下载当前提示词">⇩</button>
                    <button id="copyBtn" class="primary-button" type="button">复制</button>
                </div>
            </section>

            <section class="content-grid">
                <div class="duties-panel">
                    <div class="section-head">
                        <div>
                            <p class="eyebrow">职责库</p>
                            <h3>选择职责</h3>
                        </div>
                        <button id="toggleCustomBtn" class="ghost-button" type="button">新增职责</button>
                    </div>

                    <form id="customForm" class="custom-form" hidden>
                        <label>
                            <span>职责名称</span>
                            <input id="customDutyTitle" type="text" placeholder="例如：招聘渠道优化">
                        </label>
                        <label>
                            <span>职责描述</span>
                            <textarea id="customDutyText" rows="4" placeholder="写下需要 AI 辅助完成的具体工作"></textarea>
                        </label>
                        <button class="primary-button" type="submit">生成</button>
                    </form>

                    <div id="dutiesList" class="duties-list"></div>
                </div>

                <section class="prompt-panel" aria-label="提示词预览">
                    <div class="section-head prompt-head">
                        <div>
                            <p class="eyebrow">输出</p>
                            <h3>提示词预览</h3>
                        </div>
                        <span id="promptMeta" class="status-pill">等待生成</span>
                    </div>
                    <pre id="promptOutput" class="prompt-output">选择左侧职责后，这里会生成可直接使用的专业提示词。</pre>
                </section>
            </section>

            <section class="favorites-panel" aria-label="收藏提示词">
                <div class="section-head">
                    <div>
                        <p class="eyebrow">收藏夹</p>
                        <h3>常用提示词</h3>
                    </div>
                    <button id="clearFavoritesBtn" class="ghost-button" type="button">清空</button>
                </div>
                <div id="favoritesList" class="favorites-list"></div>
            </section>
        </main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="./app.js"></script>
</body>
</html>
