<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI提示词生成工具 - 岗位职责助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #f0f4f8 0%, #e6edf4 100%);
            min-height: 100vh;
            padding: 24px;
        }

        /* 主容器 - 类似桌面应用布局 */
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.25), 0 2px 6px rgba(0,0,0,0.05);
            overflow: hidden;
            transition: all 0.2s;
        }

        /* 两栏布局 */
        .dashboard {
            display: flex;
            flex-wrap: wrap;
            min-height: 75vh;
        }

        /* 左侧岗位列表 (侧边栏) */
        .sidebar {
            flex: 0 0 280px;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(4px);
            border-right: 1px solid rgba(0,0,0,0.08);
            padding: 1.75rem 0 2rem 0;
            box-shadow: 4px 0 12px rgba(0,0,0,0.02);
        }

        .sidebar-header {
            padding: 0 1.5rem 1.25rem 1.5rem;
            border-bottom: 2px solid #eef2f6;
            margin-bottom: 1rem;
        }

        .sidebar-header h2 {
            font-size: 1.4rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1F2B3C, #2C3E50);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.2px;
        }

        .sidebar-header p {
            font-size: 0.75rem;
            color: #5a6e7c;
            margin-top: 6px;
        }

        .job-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 0 1rem;
        }

        .job-item {
            background: transparent;
            border: none;
            text-align: left;
            padding: 12px 16px;
            margin: 0;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 1rem;
            color: #1f2a3e;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

        .job-item:hover {
            background: #e9eef3;
            transform: translateX(4px);
        }

        .job-item.active {
            background: #2c3e50;
            color: white;
            box-shadow: 0 6px 12px -8px rgba(0,0,0,0.2);
        }

        .job-item.active .job-icon {
            filter: brightness(0) invert(1);
        }

        .job-icon {
            font-size: 1.3rem;
            width: 28px;
            text-align: center;
        }

        /* 右侧内容区 */
        .main-content {
            flex: 1;
            padding: 1.8rem 2rem 2rem 2rem;
            background: rgba(255,255,255,0.6);
        }

        /* 职责面板 */
        .responsibility-panel {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(0,0,0,0.04);
            transition: 0.2s;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 1.25rem;
            border-bottom: 2px solid #eef2fa;
            padding-bottom: 0.75rem;
        }

        .role-title {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(120deg, #1E2A3A, #2c3e50);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .badge {
            background: #eef2ff;
            color: #1f4a6e;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .duty-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .duty-card {
            background: #f9fbfd;
            border-radius: 1rem;
            padding: 0.9rem 1rem;
            border-left: 5px solid #3b82f6;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .duty-text {
            font-size: 0.96rem;
            color: #1e2a3a;
            line-height: 1.4;
            flex: 1;
        }

        .generate-prompt-btn {
            background: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 2rem;
            padding: 6px 16px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #2c3e50;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .generate-prompt-btn:hover {
            background: #2c3e50;
            border-color: #2c3e50;
            color: white;
            transform: translateY(-1px);
        }

        /* 提示词输出区域 */
        .prompt-output-section {
            background: #1e293b;
            border-radius: 1.5rem;
            box-shadow: 0 15px 30px -12px rgba(0,0,0,0.2);
            overflow: hidden;
            margin-top: 0.5rem;
        }

        .output-header {
            background: #0f172a;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border-bottom: 1px solid #334155;
        }

        .output-header h3 {
            color: #e2e8f0;
            font-size: 1.1rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .copy-btn {
            background: #334155;
            border: none;
            padding: 6px 14px;
            border-radius: 40px;
            color: white;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .copy-btn:hover {
            background: #475569;
        }

        .prompt-display {
            padding: 1.6rem;
            background: #0f172a;
            color: #e2e8f0;
            font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            border-radius: 0 0 1.5rem 1.5rem;
            min-height: 180px;
        }

        .empty-prompt {
            color: #6c86a3;
            font-style: italic;
        }

        /* 提示动画 */
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            z-index: 1000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            pointer-events: none;
            transition: opacity 0.2s;
            opacity: 0;
        }

        .toast-msg.show {
            opacity: 1;
        }

        hr {
            margin: 10px 0;
        }

        @media (max-width: 760px) {
            body {
                padding: 12px;
            }
            .sidebar {
                flex: 0 0 100%;
                border-right: none;
                border-bottom: 1px solid rgba(0,0,0,0.08);
                padding: 1rem 0;
            }
            .job-list {
                flex-direction: row;
                flex-wrap: wrap;
            }
            .job-item {
                width: auto;
                flex: 1 0 auto;
            }
            .main-content {
                padding: 1.25rem;
            }
            .role-title {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="dashboard">
        <!-- 左侧岗位列表 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>📋 岗位智库</h2>
                <p>选择岗位 · 查看职责 · 生成提示词</p>
            </div>
            <div class="job-list" id="jobListContainer">
                <!-- 动态注入岗位按钮 -->
            </div>
        </div>

        <!-- 右侧主要内容 -->
        <div class="main-content">
            <!-- 职责与分工面板 -->
            <div class="responsibility-panel" id="responsibilityPanel">
                <div class="panel-header">
                    <span class="role-title" id="currentRoleName">HR 人力资源</span>
                    <span class="badge" id="roleBadge">核心职责与分工</span>
                </div>
                <div id="dutiesContainer" class="duty-list">
                    <!-- 动态生成职责卡片列表 -->
                </div>
            </div>

            <!-- 提示词生成展示区 -->
            <div class="prompt-output-section">
                <div class="output-header">
                    <h3>✨ 智能提示词预览</h3>
                    <button id="copyPromptBtn" class="copy-btn">📋 复制提示词</button>
                </div>
                <div id="promptDisplay" class="prompt-display">
                    <span class="empty-prompt">⚡ 点击任一职责旁的「生成提示词」按钮，将自动生成专业AI提示词</span>
                </div>
            </div>
        </div>
    </div>
</div>
<div id="toastMessage" class="toast-msg">✅ 已复制到剪贴板</div>

<script>
    // ---------- 岗位数据集 (可无限扩展) ----------
    const jobsData = {
        hr: {
            name: "HR 人力资源",
            icon: "👥",
            duties: [
                { id: "hr_recruit", text: "招聘与配置：根据业务需求制定招聘计划，发布职位，筛选简历，组织面试，完成人才引进。", promptHint: "招聘专家" },
                { id: "hr_train", text: "培训与发展：搭建培训体系，组织员工技能提升、领导力培养项目，规划职业发展路径。", promptHint: "培训与发展顾问" },
                { id: "hr_perf", text: "绩效管理：设计并实施绩效考核方案（KPI/OKR），组织绩效评估，推动绩效改进计划。", promptHint: "绩效管理专家" },
                { id: "hr_culture", text: "企业文化与员工关系：组织文化活动，处理员工入职/离职手续，劳动关系合规，员工关怀。", promptHint: "员工关系与文化专员" }
            ]
        },
        marketing: {
            name: "市场营销",
            icon: "📈",
            duties: [
                { id: "mkt_strategy", text: "市场战略制定：行业分析，竞品调研，目标市场定位，输出年度营销策略地图。", promptHint: "市场策略分析师" },
                { id: "mkt_brand", text: "品牌管理：品牌定位、视觉体系规范，品牌传播战役策划，提升品牌美誉度。", promptHint: "品牌策划专家" },
                { id: "mkt_digital", text: "数字营销：SEO/SEM策略，社交媒体运营（抖音/小红书/公众号），广告投放优化。", promptHint: "数字营销运营" },
                { id: "mkt_activity", text: "活动策划执行：线上/线下发布会，展会，用户增长活动，ROI分析与复盘。", promptHint: "活动策划与执行" }
            ]
        },
        product: {
            name: "产品经理",
            icon: "📱",
            duties: [
                { id: "pd_research", text: "用户调研与需求分析：客户访谈，数据洞察，定义用户画像，输出需求文档。", promptHint: "用户洞察专家" },
                { id: "pd_roadmap", text: "产品规划与路线图：版本迭代计划，功能优先级评估，roadmap制定与同步。", promptHint: "产品路线图规划" },
                { id: "pd_design", text: "原型与交互设计：输出低保真/高保真原型，撰写PRD，协同设计团队落地。", promptHint: "交互与原型设计" },
                { id: "pd_metric", text: "数据分析与产品优化：核心指标监控，AB测试方案，以数据驱动产品迭代。", promptHint: "产品数据增长" }
            ]
        },
        engineer: {
            name: "后端开发",
            icon: "⚙️",
            duties: [
                { id: "eng_api", text: "API 设计与开发：RESTful / GraphQL 接口，文档编写，高并发处理逻辑。", promptHint: "后端架构" },
                { id: "eng_db", text: "数据库设计：表结构、索引优化、分库分表方案，数据迁移与备份策略。", promptHint: "数据库专家" },
                { id: "eng_perf", text: "性能优化：服务调优，慢查询分析，缓存策略（Redis），系统瓶颈排查。", promptHint: "性能优化工程师" },
                { id: "eng_security", text: "安全与稳定性：接口防刷，SQL注入防范，日志监控，服务高可用设计。", promptHint: "系统安全与可靠性" }
            ]
        },
        design: {
            name: "UI/UX 设计",
            icon: "🎨",
            duties: [
                { id: "ui_visual", text: "视觉设计：定义设计系统，组件库建设，高保真界面落地，品牌风格延展。", promptHint: "UI视觉设计师" },
                { id: "ux_research", text: "用户体验研究：用户旅程地图，可用性测试，竞品交互分析，提升易用性。", promptHint: "用户体验研究员" },
                { id: "proto_interact", text: "交互原型制作：Figma/即时原型，动态微交互，输出交互说明文档。", promptHint: "交互设计专家" },
                { id: "design_collab", text: "设计协作与评审：与产品/开发协作，走查还原度，迭代设计规范。", promptHint: "设计协作规范" }
            ]
        }
    };

    // 当前激活的岗位key
    let currentJobKey = "hr";
    // 存储最新生成的提示词内容 (供复制)
    let latestPromptText = "";

    // DOM 元素
    const jobListContainer = document.getElementById("jobListContainer");
    const currentRoleNameSpan = document.getElementById("currentRoleName");
    const dutiesContainer = document.getElementById("dutiesContainer");
    const promptDisplayDiv = document.getElementById("promptDisplay");
    const copyBtn = document.getElementById("copyPromptBtn");
    const toastMsg = document.getElementById("toastMessage");

    // 显示Toast
    function showToast(message, duration = 2000) {
        toastMsg.textContent = message || "✅ 已复制到剪贴板";
        toastMsg.classList.add("show");
        setTimeout(() => {
            toastMsg.classList.remove("show");
        }, duration);
    }

    // 核心：根据岗位职责文本 + 职责名称 + 岗位角色 生成高质量AI提示词
    function generatePrompt(roleName, dutyText, dutyHint = "") {
        // 构建清晰的角色与上下文提示词模板（适配网站开发/通用AI提示风格）
        const techContext = `你是一名专业的${roleName}专家，同时擅长与AI协作提效。请根据以下职责描述，写一段可以直接用于AI工具（如ChatGPT、Claude、Copilot）的详细提示词，要求包含明确角色、任务目标、输出格式和约束条件。`;
        const coreTask = `职责描述：${dutyText}`;
        const additionalGuidelines = `1. 提示词要具体，可操作，适合AI辅助完成实际工作。
2. 包含「角色设定」「任务目标」「关键步骤」「输出要求」四个板块。
3. 适当加入行业最佳实践，字数在150~300字之间，专业且简洁。
4. 如果涉及数据分析、文案、策略、设计或代码，请给出明确的交付物格式（如表格、markdown、JSON）。`;

        // 如果职责有定制hint就稍微个性化
        const hintSegment = dutyHint ? `特别聚焦：${dutyHint}方向。` : "";
        const fullPrompt = `请扮演资深${roleName}。${hintSegment}
任务：基于以下职责 —— ${dutyText}，为我生成一份高效的AI提示词。
生成的提示词需要能直接指导AI助手完成该职责下的典型工作流程。
---
提示词模板应如下结构：

# 角色
你是一位经验丰富的${roleName}，深耕${dutyHint || roleName}领域。

# 目标
${dutyText}

# 工作步骤
1. (根据职责列出3-5个关键动作)
2. ...
3. 提供可交付成果。

# 输出规范
- 以清晰Markdown或结构化文本输出
- 包含具体示例/模板
- 若有数据或文案，以表格/列表呈现

请直接输出最终提示词，不要过多解释。`;

        // 实际返回完善的提示词（贴合真实场景）
        return `【AI提示词 · ${roleName} · ${dutyHint || "职责驱动"}】

👉 复制以下内容发送给AI：

---
你是一名专业的${roleName}，专精于「${dutyText.slice(0, 50)}${dutyText.length > 50 ? "…" : ""}」。

任务目标：根据以下职责详细拆解并执行工作流 —— ${dutyText}

执行要求：
1. 首先，分析该职责在当前业务场景中的优先级与痛点。
2. 其次，输出一份行动清单，包含不少于4个可落地步骤。
3. 接着，提供可以直接使用的模板/话术/检查表（至少一项）。
4. 最终，给出可量化的验收指标或交付物示例。

额外约束：
- 使用中文回复，专业但不晦涩。
- 如果涉及跨部门协作，明确协作角色。
- 输出格式：分段标题 + 项目符号列表 + 一个实际案例（表格或代码框可选）。

请开始执行。
---`;

        // 更优雅简洁但丰富版本 —— 实际上方已经满足专业度，再次生成动态且包含详细职责
    }

    // 真正的智能生成：根据当前岗位 + 职责详情 产生精致提示词（带动态内容）
    function buildSmartPrompt(roleName, dutyObj) {
        const { text, promptHint } = dutyObj;
        const specificHint = promptHint ? ` (重点关注: ${promptHint})` : "";
        const dynamicPrompt = `# 🧠 专家级AI提示词 · ${roleName}${specificHint}

## 📌 角色设定  
你是一位顶尖的${roleName}，拥有10年以上实战经验，精通“${text}”这一核心职能。你善于结构化思考，能够快速产出可落地方案。

## 🎯 任务目标  
基于以下职责描述，帮助我完成高质量的工作输出：  
**职责：** ${text}

## 📋 执行步骤（请按顺序输出）  
1. **需求澄清**：列举需要我补充的3个关键信息点（若信息充分则直接进入第2步）。  
2. **方案框架**：给出达成该职责的完整方法论框架，不少于4个核心模块。  
3. **工具/模板**：提供一个可直接套用的表格模板、检查清单或提示词话术库。  
4. **避坑指南**：列出该职责中最常见的3个错误及解决建议。  
5. **交付示例**：根据常见场景模拟一份简短交付样例（报告片段、文案或策略图描述）。  

## ✅ 输出格式要求  
- 使用Markdown，层级分明。  
- 关键术语加粗。  
- 输出结尾附上“下一步行动建议”。

---
**现在请开始扮演${roleName}完成以上任务。**`;

        return dynamicPrompt;
    }

    // 渲染职责列表 + 绑定生成按钮事件
    function renderDuties(jobKey) {
        const job = jobsData[jobKey];
        if (!job) return;
        currentRoleNameSpan.innerText = job.name;
        const duties = job.duties;
        if (!duties.length) {
            dutiesContainer.innerHTML = `<div class="duty-card">暂无职责数据</div>`;
            return;
        }

        // 生成职责卡片 HTML
        let dutiesHtml = "";
        duties.forEach(duty => {
            dutiesHtml += `
                <div class="duty-card" data-duty-id="${duty.id}">
                    <div class="duty-text">📌 ${escapeHtml(duty.text)}</div>
                    <button class="generate-prompt-btn" data-duty-text="${escapeHtml(duty.text)}" data-duty-hint="${escapeHtml(duty.promptHint || "")}">
                        ✨ 生成提示词
                    </button>
                </div>
            `;
        });
        dutiesContainer.innerHTML = dutiesHtml;

        // 绑定每个按钮的生成事件 (事件委托也可，直接绑定)
        const allGenBtns = document.querySelectorAll(".generate-prompt-btn");
        allGenBtns.forEach(btn => {
            btn.removeEventListener("click", handleGenerateClick);
            btn.addEventListener("click", handleGenerateClick);
        });
    }

    // 辅助转义
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // 生成点击事件：获取职责文本、职责hint，生成提示词并显示
    function handleGenerateClick(event) {
        event.stopPropagation();
        const btn = event.currentTarget;
        const dutyTextRaw = btn.getAttribute("data-duty-text") || "";
        const dutyHintRaw = btn.getAttribute("data-duty-hint") || "";
        const dutyText = dutyTextRaw;
        const dutyHint = dutyHintRaw;
        const currentRole = jobsData[currentJobKey]?.name || "专家";

        // 构建当前职责对象
        const dutyObj = { text: dutyText, promptHint: dutyHint };
        const finalPrompt = buildSmartPrompt(currentRole, dutyObj);
        latestPromptText = finalPrompt;
        // 显示到界面
        promptDisplayDiv.innerHTML = `<pre style="white-space: pre-wrap; font-family: monospace; margin:0;">${escapeHtml(finalPrompt)}</pre>`;
        showToast("✨ 提示词已生成", 1200);
    }

    // 渲染左侧岗位列表
    function renderJobList() {
        const jobKeys = Object.keys(jobsData);
        let btnsHtml = "";
        jobKeys.forEach(key => {
            const job = jobsData[key];
            const isActive = (currentJobKey === key);
            const activeClass = isActive ? "active" : "";
            btnsHtml += `
                <button class="job-item ${activeClass}" data-job-key="${key}">
                    <span class="job-icon">${job.icon}</span>
                    <span>${job.name}</span>
                </button>
            `;
        });
        jobListContainer.innerHTML = btnsHtml;
        // 绑定岗位点击事件
        const jobBtns = document.querySelectorAll(".job-item");
        jobBtns.forEach(btn => {
            btn.addEventListener("click", (e) => {
                const newKey = btn.getAttribute("data-job-key");
                if (newKey && jobsData[newKey]) {
                    currentJobKey = newKey;
                    // 更新按钮active样式
                    document.querySelectorAll(".job-item").forEach(b => b.classList.remove("active"));
                    btn.classList.add("active");
                    // 重新渲染右侧职责区域
                    renderDuties(currentJobKey);
                    // 切换岗位时不清空提示词？保持最后的提示词更友好，但也为了方便: 不清空用户也可以再次生成
                    // 但为了体验，如果希望保留提示词区域暂不清空，但是显示一条温馨提示
                    if (latestPromptText) {
                        // 保留之前的提示词不做强制重置，让用户持续复制之前生成的内容。
                        // 但我们可以加一段提醒，但无所谓，更符合预期； 可保留
                    } else {
                        promptDisplayDiv.innerHTML = `<span class="empty-prompt">⚡ 点击任一职责旁的「生成提示词」按钮，将自动生成专业AI提示词</span>`;
                        latestPromptText = "";
                    }
                }
            });
        });
    }

    // 复制功能
    function copyPromptToClipboard() {
        if (!latestPromptText || latestPromptText.trim() === "") {
            showToast("⚠️ 暂无生成好的提示词，请先点击职责卡片「生成提示词」", 1500);
            return;
        }
        navigator.clipboard.writeText(latestPromptText).then(() => {
            showToast("✅ 提示词已复制到剪贴板", 1500);
        }).catch(() => {
            // 降级
            const textarea = document.createElement("textarea");
            textarea.value = latestPromptText;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand("copy");
            document.body.removeChild(textarea);
            showToast("✅ 已复制 (兼容模式)", 1500);
        });
    }

    // 初始化: 渲染岗位、默认渲染HR职责
    function init() {
        renderJobList();
        renderDuties(currentJobKey);
        copyBtn.addEventListener("click", copyPromptToClipboard);
        // 初始提示为空样式
        latestPromptText = "";
        promptDisplayDiv.innerHTML = `<span class="empty-prompt">⚡ 点击任一职责旁的「生成提示词」按钮，将自动生成专业AI提示词</span>`;
    }

    init();
</script>
</body>
</html>
